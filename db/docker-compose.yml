version: "3.9"

services:
  # db:
  #   image: mysql:8.0
  #   container_name: synergysphere-db
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: synergysphere
  #     MYSQL_USER: devuser
  #     MYSQL_PASSWORD: devpass
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - db_data:/var/lib/mysql

  # Uncomment for PostgreSQL instead:
  db:
    image: postgres:15
    container_name: synergysphere-db
    restart: always
    environment:
      POSTGRES_DB: synergysphere
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0
    container_name: synergysphere-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
